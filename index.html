<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lucas Qiu</title>
<meta name="description" content="Lucas Qiu — researcher at United Imaging Research working on kinetic modeling for PET, medical agent harnesses, observability, and alignment.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=JetBrains+Mono:wght@300..600&family=IBM+Plex+Sans:wght@300..600&family=EB+Garamond:ital,wght@0,400..700;1,400..700&family=DM+Sans:opsz,wght@9..40,300..700&family=Noto+Sans+SC:wght@300..700&family=Noto+Serif+SC:wght@300..700&display=swap" rel="stylesheet">

<style>
  html,body{margin:0;background:#f6f3ec;font-family:-apple-system,system-ui,sans-serif}

  /* Responsive layer. The desktop A* design is untouched — these rules apply
     only on phone-width viewports and override the components' inline styles
     with !important (everything in the locked components is styled inline). */
  @media (max-width: 700px) {
    .v1 { padding: 28px 18px 52px !important; }

    /* Top nav: let links wrap, tighten spacing */
    .v1 header { margin-bottom: 44px !important; }
    .v1 header nav { gap: 14px !important; flex-wrap: wrap !important; justify-content: flex-end; }

    /* Hero: stack the headshot above the name instead of side-by-side */
    .v1 main > section:first-of-type > div:first-of-type {
      flex-direction: column !important;
      align-items: flex-start !important;
      gap: 22px !important;
    }
    /* Headshot: responsive square (was locked at 460px) */
    .v1 main > section:first-of-type > div:first-of-type > div:first-of-type {
      width: 72vw !important; height: 72vw !important;
      max-width: 320px !important; max-height: 320px !important;
    }

    /* Slightly smaller lede on phones */
    .v1 [style*="font-size: 21px"] { font-size: 18px !important; }

    /* Tighten the big desktop section gaps */
    .v1 [style*="margin-bottom: 120px"] { margin-bottom: 52px !important; }
    .v1 [style*="margin-bottom: 96px"]  { margin-bottom: 52px !important; }

    /* Reading detail panel: stack the cover above the text */
    #reading [style*="170px 1fr"] {
      grid-template-columns: 1fr !important;
      gap: 18px !important;
    }
  }
</style>

<!-- React + in-browser JSX transpile. Sufficient for a static github.io site;
     swap for a precompiled bundle if first-paint weight becomes a concern. -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- A* — Motion edition. Order matters: shared content + book data load before
     the components that consume them; the motion wrapper loads last. -->
<script type="text/babel" src="shared.jsx"></script>
<script src="books-data.js"></script>
<script type="text/babel" src="books.jsx"></script>
<script type="text/babel" src="v1-scholar.jsx"></script>
<script type="text/babel" src="v1-scholar-wow.jsx"></script>
<script type="text/babel">
  const { V1ScholarWow } = window;
  ReactDOM.createRoot(document.getElementById('root')).render(<V1ScholarWow />);
</script>
</body>
</html>
